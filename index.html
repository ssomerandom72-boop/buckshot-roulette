<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buckshot Roulette</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Pulsing red vignette */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center,
                transparent 40%,
                rgba(60, 0, 0, 0.35) 70%,
                rgba(20, 0, 0, 0.75) 100%);
            pointer-events: none;
            z-index: 10;
            animation: vignette-pulse 4s ease-in-out infinite;
        }

        /* Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.08) 0px,
                rgba(0, 0, 0, 0.08) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 11;
        }

        @keyframes vignette-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.7; }
        }

        @keyframes msg-fadein {
            from { opacity: 0; transform: translateX(-50%) translateY(-48%) scale(0.96); }
            to   { opacity: 1; transform: translateX(-50%) translateY(-50%) scale(1); }
        }

        @keyframes btn-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(180, 0, 0, 0.5), inset 0 0 4px rgba(0,0,0,0.8); }
            50%       { box-shadow: 0 0 22px rgba(255, 30, 30, 0.9), 0 0 40px rgba(180, 0, 0, 0.4), inset 0 0 4px rgba(0,0,0,0.8); }
        }

        @keyframes item-fadein {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Debug — hidden by default */
        #debug-status {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            color: yellow;
            font-size: 1em;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
            z-index: 1000;
        }

        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Main UI layer */
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        /* Top bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            padding: 18px 24px 0;
            gap: 16px;
        }

        /* Health panels */
        .health-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(8, 0, 3, 0.85);
            border: 1px solid #6b0000;
            padding: 12px 24px 14px;
            min-width: 160px;
            box-shadow:
                0 0 16px rgba(139, 0, 0, 0.45),
                inset 0 0 20px rgba(0, 0, 0, 0.65);
        }

        .health-label {
            font-size: 0.65em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #7a0000;
            font-weight: bold;
        }

        #dealer-charges,
        #player-charges {
            font-size: 1.7em;
            letter-spacing: 6px;
            line-height: 1;
        }

        .charge-live {
            color: #cc2200;
            text-shadow: 0 0 8px rgba(200, 30, 0, 0.9);
        }

        .charge-dead {
            color: #252525;
            text-shadow: none;
        }

        /* Shell info — center top */
        #shell-info {
            align-self: center;
            background: rgba(5, 0, 5, 0.88);
            border: 1px solid #4a0000;
            padding: 10px 22px;
            font-size: 0.95em;
            letter-spacing: 2px;
            text-align: center;
            color: #bbb;
            box-shadow: 0 0 12px rgba(100, 0, 0, 0.35);
        }

        /* Round indicator */
        #round-display {
            align-self: center;
            font-size: 0.58em;
            letter-spacing: 5px;
            color: #5a0000;
            text-transform: uppercase;
            text-align: center;
            margin-top: 4px;
        }

        /* Message box */
        #message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            background: rgba(4, 0, 2, 0.94);
            border: 1px solid #8b0000;
            padding: 28px 52px;
            font-size: 2.2em;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            color: #e0e0e0;
            max-width: 80vw;
            pointer-events: none;
            box-shadow:
                0 0 30px rgba(139, 0, 0, 0.55),
                0 0 70px rgba(80, 0, 0, 0.3),
                inset 0 0 24px rgba(0, 0, 0, 0.75);
            animation: msg-fadein 0.2s ease-out forwards;
            z-index: 50;
        }

        /* Action buttons */
        .actions {
            padding: 0 24px 16px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .action-row {
            display: flex;
            gap: 20px;
        }

        button {
            background: rgba(6, 0, 3, 0.92);
            border: 1px solid #8b0000;
            color: #cccccc;
            padding: 16px 44px;
            font-size: 1.05em;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 0 8px rgba(139, 0, 0, 0.4);
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        }

        button:hover {
            background: rgba(120, 0, 0, 0.88);
            color: #fff;
            animation: btn-glow 1.2s ease-in-out infinite;
        }

        button:active {
            background: rgba(170, 0, 0, 0.92);
        }

        /* Inventory */
        #player-inventory {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 36px;
        }

        .item-btn {
            background: rgba(4, 0, 8, 0.92);
            border: 1px solid #6b003a;
            color: #cc88aa;
            padding: 6px 14px;
            font-size: 0.72em;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 0 6px rgba(139, 0, 60, 0.35);
            transition: background 0.15s, color 0.15s;
            animation: item-fadein 0.2s ease-out forwards;
        }

        .item-btn:hover {
            background: rgba(100, 0, 50, 0.88);
            color: #fff;
            border-color: #cc0055;
            animation: none;
            box-shadow: 0 0 14px rgba(200, 0, 80, 0.6);
        }

        .item-btn:active {
            background: rgba(160, 0, 60, 0.92);
        }

        /* Item offer overlay */
        #item-offer {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(4, 0, 10, 0.96);
            border: 1px solid #6b003a;
            padding: 18px 32px;
            text-align: center;
            z-index: 55;
            pointer-events: auto;
            box-shadow:
                0 0 20px rgba(139, 0, 60, 0.55),
                inset 0 0 14px rgba(0, 0, 0, 0.75);
            animation: item-fadein 0.2s ease-out forwards;
            min-width: 280px;
        }

        #item-offer .offer-title {
            font-size: 0.6em;
            letter-spacing: 4px;
            color: #6b003a;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        #item-offer .offer-name {
            font-size: 1.4em;
            letter-spacing: 4px;
            color: #cc88aa;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        #item-offer .offer-timer {
            font-size: 0.6em;
            letter-spacing: 2px;
            color: #5a3040;
            margin-bottom: 12px;
        }

        .offer-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .offer-btns button {
            padding: 10px 24px;
            font-size: 0.85em;
            letter-spacing: 3px;
        }

        #offer-pickup-btn {
            border-color: #cc0055;
            color: #ff88aa;
        }

        #offer-leave-btn {
            border-color: #4a0000;
            color: #888;
        }

        /* Game over screen */
        #game-over-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            background: rgba(0, 0, 0, 0.72);
            z-index: 60;
            pointer-events: auto;
        }

        #game-over-screen #restart-btn {
            font-size: 1.3em;
            padding: 20px 64px;
            letter-spacing: 6px;
            border-color: #cc0000;
            box-shadow: 0 0 20px rgba(180, 0, 0, 0.6);
        }

        .hidden { display: none !important; }

        /* Blood hit overlay */
        #blood-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 18;
            opacity: 0;
            background:
                radial-gradient(ellipse at center, transparent 18%, rgba(160, 0, 0, 0.55) 55%, rgba(80, 0, 0, 0.92) 100%);
        }

        @keyframes blood-flash {
            0%   { opacity: 0.92; }
            15%  { opacity: 0.75; }
            50%  { opacity: 0.35; }
            100% { opacity: 0; }
        }

        #blood-overlay.blood-flash {
            animation: blood-flash 0.85s ease-out forwards;
        }
    </style>
</head>
<body>
    <h1 id="debug-status">JS not started.</h1>
    <div id="scene-container"></div>
    <div id="blood-overlay"></div>

    <div id="ui">
        <div class="info-bar">
            <div class="health-display">
                <div class="health-label">Dealer</div>
                <div id="dealer-charges"></div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
                <div id="round-display">Round 1  |  You ☆☆ vs ☆☆ Dealer</div>
                <div id="shell-info" class="hidden"></div>
            </div>

            <div class="health-display">
                <div class="health-label">You</div>
                <div id="player-charges"></div>
            </div>
        </div>

        <div id="message-box" class="hidden"></div>

        <div id="player-actions" class="actions hidden">
            <div id="player-inventory"></div>
            <div class="action-row">
                <button id="shoot-dealer">Shoot Dealer</button>
                <button id="shoot-self">Shoot Self</button>
            </div>
        </div>
    </div>

    <div id="item-offer" class="hidden">
        <div class="offer-title">Item Found</div>
        <div id="offer-item-name" class="offer-name">---</div>
        <div id="offer-timer" class="offer-timer">5s</div>
        <div class="offer-btns">
            <button id="offer-pickup-btn">Pick Up</button>
            <button id="offer-leave-btn">Leave</button>
        </div>
    </div>

    <div id="game-over-screen" class="hidden">
        <button id="restart-btn">Play Again</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>
    <script type="module" src="project.js"></script>
</body>
</html>
