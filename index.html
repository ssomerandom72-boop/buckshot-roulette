<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buckshot Roulette</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background: #000 url('claudeusetsasthebackround.jpg') center center / cover no-repeat;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Pulsing red vignette */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center,
                transparent 40%,
                rgba(60, 0, 0, 0.35) 70%,
                rgba(20, 0, 0, 0.75) 100%);
            pointer-events: none;
            z-index: 10;
            animation: vignette-pulse 4s ease-in-out infinite;
        }

        /* Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.08) 0px,
                rgba(0, 0, 0, 0.08) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 11;
        }

        @keyframes vignette-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.7; }
        }

        @keyframes msg-fadein {
            from { opacity: 0; transform: translateX(-50%) translateY(-48%) scale(0.96); }
            to   { opacity: 1; transform: translateX(-50%) translateY(-50%) scale(1); }
        }

        @keyframes btn-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(180, 0, 0, 0.5), inset 0 0 4px rgba(0,0,0,0.8); }
            50%       { box-shadow: 0 0 22px rgba(255, 30, 30, 0.9), 0 0 40px rgba(180, 0, 0, 0.4), inset 0 0 4px rgba(0,0,0,0.8); }
        }

        @keyframes item-fadein {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Debug — hidden by default */
        #debug-status {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            color: yellow;
            font-size: 1em;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
            z-index: 1000;
        }

        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Main UI layer */
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        /* Top bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            padding: 18px 24px 0;
            gap: 16px;
        }

        /* Health panels */
        .health-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(8, 0, 3, 0.85);
            border: 1px solid #6b0000;
            padding: 12px 24px 14px;
            min-width: 160px;
            box-shadow:
                0 0 16px rgba(139, 0, 0, 0.45),
                inset 0 0 20px rgba(0, 0, 0, 0.65);
        }

        .health-label {
            font-size: 0.65em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #7a0000;
            font-weight: bold;
        }

        #dealer-charges,
        #player-charges {
            font-size: 1.7em;
            letter-spacing: 6px;
            line-height: 1;
        }

        .charge-live {
            color: #cc2200;
            text-shadow: 0 0 8px rgba(200, 30, 0, 0.9);
        }

        .charge-dead {
            color: #252525;
            text-shadow: none;
        }

        /* Shell info — center top */
        #shell-info {
            align-self: center;
            background: rgba(5, 0, 5, 0.88);
            border: 1px solid #4a0000;
            padding: 10px 22px;
            font-size: 0.95em;
            letter-spacing: 2px;
            text-align: center;
            color: #bbb;
            box-shadow: 0 0 12px rgba(100, 0, 0, 0.35);
        }

        /* Round indicator */
        #round-display {
            align-self: center;
            font-size: 0.58em;
            letter-spacing: 5px;
            color: #5a0000;
            text-transform: uppercase;
            text-align: center;
            margin-top: 4px;
        }

        /* Message box */
        #message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            background: rgba(4, 0, 2, 0.94);
            border: 1px solid #8b0000;
            padding: 28px 52px;
            font-size: 2.2em;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            color: #e0e0e0;
            max-width: 80vw;
            pointer-events: none;
            box-shadow:
                0 0 30px rgba(139, 0, 0, 0.55),
                0 0 70px rgba(80, 0, 0, 0.3),
                inset 0 0 24px rgba(0, 0, 0, 0.75);
            animation: msg-fadein 0.2s ease-out forwards;
            z-index: 50;
        }

        /* Action buttons */
        .actions {
            padding: 0 24px 16px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .action-row {
            display: flex;
            gap: 20px;
        }

        button {
            background: rgba(6, 0, 3, 0.92);
            border: 1px solid #8b0000;
            color: #cccccc;
            padding: 16px 44px;
            font-size: 1.05em;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 0 8px rgba(139, 0, 0, 0.4);
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        }

        button:hover {
            background: rgba(120, 0, 0, 0.88);
            color: #fff;
            animation: btn-glow 1.2s ease-in-out infinite;
        }

        button:active {
            background: rgba(170, 0, 0, 0.92);
        }

        /* Inventory */
        #player-inventory {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 36px;
        }

        .item-btn {
            background: rgba(4, 0, 8, 0.92);
            border: 1px solid #6b003a;
            color: #cc88aa;
            padding: 6px 14px;
            font-size: 0.72em;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 0 6px rgba(139, 0, 60, 0.35);
            transition: background 0.15s, color 0.15s;
            animation: item-fadein 0.2s ease-out forwards;
        }

        .item-btn:hover {
            background: rgba(100, 0, 50, 0.88);
            color: #fff;
            border-color: #cc0055;
            animation: none;
            box-shadow: 0 0 14px rgba(200, 0, 80, 0.6);
        }

        .item-btn:active {
            background: rgba(160, 0, 60, 0.92);
        }

        /* Item offer overlay */
        #item-offer {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(4, 0, 10, 0.96);
            border: 1px solid #6b003a;
            padding: 18px 32px;
            text-align: center;
            z-index: 55;
            pointer-events: auto;
            box-shadow:
                0 0 20px rgba(139, 0, 60, 0.55),
                inset 0 0 14px rgba(0, 0, 0, 0.75);
            animation: item-fadein 0.2s ease-out forwards;
            min-width: 280px;
        }

        #item-offer .offer-title {
            font-size: 0.6em;
            letter-spacing: 4px;
            color: #6b003a;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        #item-offer .offer-name {
            font-size: 1.4em;
            letter-spacing: 4px;
            color: #cc88aa;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        #item-offer .offer-timer {
            font-size: 0.6em;
            letter-spacing: 2px;
            color: #5a3040;
            margin-bottom: 12px;
        }

        .offer-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .offer-btns button {
            padding: 10px 24px;
            font-size: 0.85em;
            letter-spacing: 3px;
        }

        #offer-pickup-btn {
            border-color: #cc0055;
            color: #ff88aa;
        }

        #offer-leave-btn {
            border-color: #4a0000;
            color: #888;
        }

        /* Game over screen */
        #game-over-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            background: rgba(0, 0, 0, 0.72);
            z-index: 60;
            pointer-events: auto;
        }

        #game-over-screen #restart-btn {
            font-size: 1.3em;
            padding: 20px 64px;
            letter-spacing: 6px;
            border-color: #cc0000;
            box-shadow: 0 0 20px rgba(180, 0, 0, 0.6);
        }

        .hidden { display: none !important; }

        /* Dealer speech bubble */
        #dealer-speech {
            position: fixed;
            top: 158px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 0, 3, 0.92);
            border-left: 2px solid #3a0000;
            border-right: 2px solid #3a0000;
            padding: 8px 22px;
            font-size: 0.78em;
            letter-spacing: 2px;
            color: #bb7070;
            font-style: italic;
            z-index: 22;
            pointer-events: none;
            white-space: nowrap;
            animation: msg-fadein 0.15s ease-out forwards;
        }

        /* Screen crack at 1 HP */
        #screen-crack {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 16;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #screen-crack:not(.hidden) { opacity: 1; }

        /* Critical HP vignette pulse */
        #critical-vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 14;
            opacity: 0;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(180,0,0,0.55) 100%);
        }
        @keyframes critical-pulse { 0%,100% { opacity:0; } 50% { opacity:1; } }
        #critical-vignette.pulse { animation: critical-pulse 1.05s ease-in-out infinite; }

        /* Round fade */
        #round-fade {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 58;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #round-fade.active { opacity: 1; pointer-events: auto; }

        /* Game over title + subtitle */
        #game-over-title {
            font-size: 3.8em;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #cc0000;
            margin-bottom: 10px;
        }
        #game-over-subtitle {
            font-size: 0.82em;
            letter-spacing: 5px;
            color: #555;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        /* Item tooltip */
        .item-btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(4,0,2,0.96);
            border: 1px solid #4a0000;
            color: #aaa;
            font-size: 0.75em;
            letter-spacing: 2px;
            padding: 4px 10px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 80;
        }
        .item-btn { position: relative; }

        /* Blood hit overlay */
        #blood-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 18;
            opacity: 0;
            background:
                radial-gradient(ellipse at center, transparent 18%, rgba(160, 0, 0, 0.55) 55%, rgba(80, 0, 0, 0.92) 100%);
        }

        @keyframes blood-flash {
            0%   { opacity: 0.92; }
            15%  { opacity: 0.75; }
            50%  { opacity: 0.35; }
            100% { opacity: 0; }
        }

        #blood-overlay.blood-flash {
            animation: blood-flash 0.85s ease-out forwards;
        }

        /* Mobile responsive */
        @media (max-width: 640px) {
            .info-bar { padding: 10px 8px 0; gap: 6px; }
            .health-display { min-width: 80px; padding: 8px 10px; }
            #dealer-charges, #player-charges { font-size: 1.2em; letter-spacing: 3px; }
            .health-label { font-size: 0.5em; letter-spacing: 2px; }
            #round-display { font-size: 0.42em; letter-spacing: 2px; }
            button { padding: 16px 22px; font-size: 0.85em; letter-spacing: 2px; min-height: 54px; touch-action: manipulation; }
            .item-btn { padding: 12px 14px; font-size: 0.75em; min-height: 46px; }
            #shell-info { font-size: 0.7em; padding: 7px 10px; }
            #message-box { font-size: 1.3em; padding: 18px 24px; letter-spacing: 3px; max-width: 92vw; }
            #dealer-speech { font-size: 0.65em; top: 125px; white-space: normal; max-width: 80vw; text-align: center; }
            #game-over-title { font-size: 2.6em; letter-spacing: 7px; }
            #key-hints { display: none; }
            .action-row { gap: 12px; }
        }
        button { touch-action: manipulation; }

        /* ── COSMETICS ── */
        #cosmetics-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 280px;
        }
        #cosmetics-player-label {
            font-size: 0.52em;
            letter-spacing: 6px;
            color: #4a0000;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        #player-name-input {
            background: rgba(6,0,3,0.92);
            border: 1px solid #8b0000;
            color: #fff;
            padding: 13px 16px;
            font-size: 1em;
            letter-spacing: 4px;
            font-family: inherit;
            width: 100%;
            text-align: center;
            outline: none;
            box-shadow: 0 0 8px rgba(139,0,0,0.35);
        }
        #player-name-input::placeholder { color: #2a0000; letter-spacing: 2px; }
        #accent-label {
            font-size: 0.5em;
            letter-spacing: 6px;
            color: #3a0000;
            text-transform: uppercase;
        }
        #accent-swatches {
            display: flex;
            gap: 12px;
        }
        .swatch {
            width: 34px;
            height: 34px;
            border: 2px solid rgba(255,255,255,0.0);
            cursor: pointer;
            padding: 0;
            min-height: unset;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
            transition: border-color 0.12s, transform 0.1s;
            animation: none !important;
            touch-action: manipulation;
        }
        .swatch:hover { transform: scale(1.18); background: inherit; color: inherit; animation: none !important; }
        .swatch.active { border-color: rgba(255,255,255,0.85); transform: scale(1.18); box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        #pause-menu {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: rgba(0,0,0,0.82);
            z-index: 62;
            pointer-events: auto;
        }

        /* ── LOBBY SCREEN ── */
        #lobby-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.93);
            z-index: 100;
            pointer-events: auto;
        }
        #lobby-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            text-align: center;
        }
        #lobby-title {
            font-size: 3em;
            letter-spacing: 10px;
            color: #cc0000;
            text-shadow: 0 0 40px rgba(200,0,0,0.8), 0 0 80px rgba(120,0,0,0.5);
            text-transform: uppercase;
        }
        #lobby-subtitle {
            font-size: 0.6em;
            letter-spacing: 8px;
            color: #3a0000;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        #lobby-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 260px;
        }
        #online-setup {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
            width: 280px;
        }
        #online-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }
        #join-row {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        #join-code-input {
            background: rgba(6,0,3,0.92);
            border: 1px solid #8b0000;
            color: #fff;
            padding: 14px 12px;
            font-size: 1.1em;
            letter-spacing: 6px;
            font-family: inherit;
            text-transform: uppercase;
            width: 160px;
            text-align: center;
            outline: none;
            box-shadow: 0 0 8px rgba(139,0,0,0.35);
        }
        #join-code-input::placeholder { color: #3a0000; letter-spacing: 3px; }
        #room-code-display { text-align: center; }
        #room-code-label {
            font-size: 0.52em;
            letter-spacing: 6px;
            color: #4a0000;
            text-transform: uppercase;
        }
        #room-code-text {
            font-size: 2.8em;
            letter-spacing: 14px;
            color: #cc0000;
            text-shadow: 0 0 20px rgba(200,0,0,0.7);
            margin: 10px 0 6px;
        }
        #lobby-status {
            font-size: 0.55em;
            letter-spacing: 4px;
            color: #3a3a3a;
            text-transform: uppercase;
            animation: vignette-pulse 2s ease-in-out infinite;
        }
        #online-status {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.48em;
            letter-spacing: 4px;
            color: #00aa44;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0,180,60,0.6);
        }
    </style>
</head>
<body>
    <h1 id="debug-status">JS not started.</h1>
    <div id="scene-container"></div>
    <div id="blood-overlay"></div>
    <div id="dealer-speech" class="hidden"></div>
    <div id="screen-crack" class="hidden">
        <svg width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <polyline points="960,60 920,280 840,510 700,690" stroke="white" stroke-width="2.5" fill="none" opacity="0.55"/>
            <polyline points="920,280 1020,530 1080,770" stroke="white" stroke-width="2" fill="none" opacity="0.45"/>
            <line x1="960" y1="60" x2="1040" y2="30" stroke="white" stroke-width="1.5" opacity="0.35"/>
            <line x1="840" y1="510" x2="760" y2="600" stroke="white" stroke-width="1.2" opacity="0.3"/>
            <line x1="1020" y1="530" x2="940" y2="640" stroke="white" stroke-width="1" opacity="0.25"/>
            <line x1="700" y1="690" x2="620" y2="810" stroke="white" stroke-width="0.8" opacity="0.2"/>
            <line x1="1080" y1="770" x2="1120" y2="860" stroke="white" stroke-width="0.7" opacity="0.18"/>
        </svg>
    </div>
    <div id="critical-vignette"></div>
    <div id="round-fade"></div>

    <div id="ui">
        <div class="info-bar">
            <div class="health-display">
                <div class="health-label">Dealer</div>
                <div id="dealer-charges"></div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
                <div id="round-display">Round 1  |  You ☆☆ vs ☆☆ Dealer</div>
                <div id="shell-info" class="hidden"></div>
            </div>

            <div class="health-display">
                <div class="health-label">You</div>
                <div id="player-charges"></div>
            </div>
        </div>

        <div id="message-box" class="hidden"></div>

        <div id="player-actions" class="actions hidden">
            <div id="player-inventory"></div>
            <div class="action-row">
                <button id="shoot-dealer">Shoot Dealer</button>
                <button id="shoot-self">Shoot Self</button>
            </div>
            <div id="key-hints" style="font-size:0.55em;letter-spacing:3px;color:#333;margin-top:4px">[S] SHOOT DEALER &nbsp; [D] SHOOT SELF &nbsp; [ESC] PAUSE</div>
        </div>
    </div>

    <div id="item-offer" class="hidden">
        <div class="offer-title">Item Found</div>
        <div id="offer-item-name" class="offer-name">---</div>
        <div id="offer-timer" class="offer-timer">5s</div>
        <div class="offer-btns">
            <button id="offer-pickup-btn">Pick Up</button>
            <button id="offer-leave-btn">Leave</button>
        </div>
    </div>

    <div id="pause-menu" class="hidden">
        <div style="font-size:2.2em;letter-spacing:8px;margin-bottom:24px;color:#cc0000">PAUSED</div>
        <button id="resume-btn">Resume</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <div id="game-over-title">GAME OVER</div>
        <div id="game-over-subtitle"></div>
        <button id="restart-btn">Play Again</button>
    </div>

    <!-- Lobby screen -->
    <div id="lobby-screen">
        <div id="lobby-content">
            <div id="lobby-title">BUCKSHOT ROULETTE</div>
            <div id="lobby-subtitle">SELECT MODE</div>
            <div id="lobby-buttons">
                <button id="mode-ai">VS AI</button>
                <button id="mode-local">LOCAL 2P</button>
                <button id="mode-online">ONLINE 2P</button>
            </div>
            <div id="cosmetics-screen" class="hidden">
                <div id="cosmetics-player-label">CUSTOMIZE — PLAYER 1</div>
                <input id="player-name-input" placeholder="Enter name..." maxlength="12" autocomplete="off" spellcheck="false">
                <div id="accent-label">COLOR</div>
                <div id="accent-swatches">
                    <button class="swatch active" data-color="#cc0000" style="background:#cc0000" title="Crimson"></button>
                    <button class="swatch" data-color="#2255cc" style="background:#2255cc" title="Cobalt"></button>
                    <button class="swatch" data-color="#00aa44" style="background:#00aa44" title="Emerald"></button>
                    <button class="swatch" data-color="#cc8800" style="background:#cc8800" title="Gold"></button>
                    <button class="swatch" data-color="#9922cc" style="background:#9922cc" title="Violet"></button>
                    <button class="swatch" data-color="#999999" style="background:#999999" title="Silver"></button>
                </div>
                <button id="cosmetics-done-btn">CONTINUE</button>
            </div>
            <div id="online-setup" class="hidden">
                <div id="online-options">
                    <button id="create-room-btn">Create Room</button>
                    <div id="join-row">
                        <input id="join-code-input" placeholder="ROOM CODE" maxlength="6" autocomplete="off" spellcheck="false">
                        <button id="join-room-btn">Join</button>
                    </div>
                </div>
                <div id="room-code-display" class="hidden">
                    <div id="room-code-label">ROOM CODE</div>
                    <div id="room-code-text">------</div>
                    <div id="lobby-status">Waiting for opponent...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Player 2 turn UI (local 2P mode) -->
    <div id="player2-actions" class="actions hidden">
        <div id="player2-turn-label" style="font-size:0.6em;letter-spacing:5px;color:#880000;text-transform:uppercase;margin-bottom:8px">Player 2's Turn</div>
        <div id="player2-inventory"></div>
        <div class="action-row">
            <button id="p2-shoot-p1">Shoot Player 1</button>
            <button id="p2-shoot-self">Shoot Self</button>
        </div>
    </div>

    <!-- Guest action UI (online mode, guest's turn) -->
    <div id="guest-actions" class="actions hidden">
        <div style="font-size:0.6em;letter-spacing:5px;color:#880000;text-transform:uppercase;margin-bottom:8px">Your Turn (Player 2)</div>
        <div id="guest-inventory"></div>
        <div class="action-row">
            <button id="g-shoot-host">Shoot Player 1</button>
            <button id="g-shoot-self">Shoot Self</button>
        </div>
    </div>

    <!-- Online connection status indicator -->
    <div id="online-status" class="hidden">● CONNECTED</div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>
    <script type="module" src="project.js"></script>
</body>
</html>
